name: .NET Core Desktop

on:
  pull_request:
    branches:
      - "qa-test(dev)"
      - "main"

permissions:
  contents: read

jobs:
  validate:
    name: Build, Test, Lint, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependências
        run: dotnet restore

      - name: Verificar formatação
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Auditoria de pacotes NuGet
        run: dotnet list package --vulnerable --include-transitive

      - name: Compilar projeto
        run: dotnet build --no-restore --configuration Release

      - name: Rodar testes com cobertura
        run: |
          dotnet test --no-build --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./TestResults/coverage.xml

      - name: Instalar ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Adicionar ferramentas .NET ao PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Gerar relatório de cobertura
        run: |
          reportgenerator \
            -reports:**/coverage.xml \
            -targetdir:coveragereport \
            -reporttypes:TextSummary

      - name: Exibir resumo da cobertura
        run: cat coveragereport/Summary.txt

      - name: Validar cobertura mínima de 80%
        shell: bash
        run: |
          COVERAGE=$(grep -oP 'Line coverage: \K[0-9]+(\.[0-9]+)?' coveragereport/Summary.txt | head -n 1)

          if [ -z "$COVERAGE" ]; then
            echo "Não foi possível identificar a cobertura no Summary.txt"
            exit 1
          fi

          echo "Cobertura encontrada: $COVERAGE%"

          awk "BEGIN { exit !($COVERAGE >= 80) }"

      - name: Publicar aplicação
        run: dotnet publish --no-build --configuration Release --output ./publish

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: ./publish
