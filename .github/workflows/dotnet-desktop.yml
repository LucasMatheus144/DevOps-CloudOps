name: .NET Core Desktop

on:
  pull_request:
    branches:
      - qa-test(dev)
      - main

jobs:
  build-test:
    name: Build, Test, Coverage and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar ou atualizar PR para main
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/qa-test-dev-to-main
          base: main
          title: "chore: promote qa-test(dev) to main"
          body: |
            PR automática criada a partir da branch qa-test(dev).
            
            Requisitos para merge:
            - aprovação obrigatória
            - pipeline verde
            - cobertura mínima atendida
          commit-message: "chore: sync qa-test(dev) to main"
          delete-branch: true

      - name: Instalar .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restaurar dependências
        run: dotnet restore

      - name: Compilar projeto
        run: dotnet build --no-restore --configuration Release

      - name: Rodar testes com cobertura
        run: |
          dotnet test --no-build --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./TestResults/coverage.xml

      - name: Instalar ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Adicionar ferramentas .NET ao PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Gerar relatório de cobertura
        run: |
          reportgenerator \
            -reports:**/coverage.xml \
            -targetdir:coveragereport \
            -reporttypes:TextSummary

      - name: Exibir resumo da cobertura
        run: cat coveragereport/Summary.txt

      - name: Validar cobertura mínima (80%)
        run: |
          COVERAGE=$(grep -oP 'Line coverage: \K[0-9]+(\.[0-9]+)?' coveragereport/Summary.txt | head -n 1)

          if [ -z "$COVERAGE" ]; then
            echo "Não foi possível identificar a cobertura no Summary.txt"
            exit 1
          fi

          echo "Cobertura encontrada: $COVERAGE%"

          awk "BEGIN {exit !($COVERAGE >= 80)}"

      - name: Publicar aplicação
        run: dotnet publish --no-build --configuration Release --output ./publish

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: ./publish
